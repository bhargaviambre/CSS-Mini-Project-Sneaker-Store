<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="checkout">
        <div class="left">
            <p>Checkout</p>
            <h2>Contact Details</h2>
            <label for="">Email ID</label>
            <input type="email" placeholder="John Doe">
            <h2>Payment</h2>
            <div class="payment-method">
                <div class="method-active">
                    <span>💳</span>
                    <p>Card</p>
                </div>
                <div class="method">
                    <span>₿</span>
                    <p>Crypto</p>
                </div>
                <div class="method">
                    <span>🏦</span>
                    <p>Bank</p>
                </div>
                <div class="method">
                    <span>⋮</span>
                </div>
                </div>
                <div class="card-form">
                    <label for="">Card Number</label>
                    <input type="text" placeholder="John Doe">
                    <div class="row">
                        <div>
                            <label for="">Expiry</label>
                            <input type="text" placeholder="MM/YY">
                        </div>
                        <div>
                            <label for="">CVC</label>
                            <input type="text" placeholder="...">
                        </div>
                    </div>
                    <div class="row">
                        <div>
                            <label for="">Country</label>
                            <input type="text" placeholder="India">
                        </div>
                        <div>
                            <Label>ZIP</Label>
                            <input type="text" placeholder="XXXXX">
                        </div>
                    </div>
                </div>
        </div>
        <div class="right">
         <div class="coupon">

    <p>Enter Coupon Code</p>

    <input type="text" placeholder="COUPON CODE">

    <button class="apply_btn">Apply Coupon</button>

</div>
    <div class="bill">
        <div class="row">
            <span>Sub Total</span>
            <span>₹4,700</span>
        </div>

        <div class="row">
            <span>Taxes (if applicable)</span>
            <span>₹199</span>
        </div>

        <div class="row">
            <span>Discount</span>
            <span>₹0</span>
        </div>

        <div class="row">
            <span>Total</span>
            <span>₹4,999</span>
        </div>
    </div>

    <button class="pay_btn">Pay Now ₹4,998</a></button>

        <div class="payments">
            <img src="secure.jpg" alt="">
            <img src="razorpay.jpg" alt="">
            <img src="upi.jpg" alt="">
        </div>
    </div>
 </div>
</div>
</div>
</body>
</html>
